<div class="theme-switcher">
  
  <!-- 1. Mode Toggle (Light/Auto/Dark) -->
  <mat-button-toggle-group class="mode-toggle" [value]="mode()" (change)="onModeChange($event.value)" aria-label="Theme mode">
    <mat-button-toggle value="light" matTooltip="Light mode">
      <mat-icon>light_mode</mat-icon>
    </mat-button-toggle>
    <mat-button-toggle value="auto" matTooltip="System mode">
      <mat-icon>brightness_auto</mat-icon>
    </mat-button-toggle>
    <mat-button-toggle value="dark" matTooltip="Dark mode">
      <mat-icon>dark_mode</mat-icon>
    </mat-button-toggle>
  </mat-button-toggle-group>

  <!-- 2. Contrast Toggle (Standard/Auto/High) -->
  <mat-button-toggle-group class="mode-toggle" [value]="contrast()" (change)="onContrastChange($event.value)" aria-label="Contrast mode">
    <mat-button-toggle value="normal" matTooltip="Standard contrast">
      <mat-icon>tonality</mat-icon>
    </mat-button-toggle>
    <mat-button-toggle value="auto" matTooltip="System contrast">
      <mat-icon>brightness_auto</mat-icon>
    </mat-button-toggle>
    <mat-button-toggle value="high" matTooltip="High contrast">
      <mat-icon>contrast</mat-icon>
    </mat-button-toggle>
  </mat-button-toggle-group>

  <div class="scheme-picker" role="group" aria-label="Color scheme">
    
    <!-- 1. Presets -->
    @for (option of schemeOptions; track option.value) {
      <button type="button" class="swatch"
        [class.swatch--active]="scheme() === option.value"
        [style.--swatch-color]="option.swatch"
        [matTooltip]="option.label"
        (click)="onSchemeSelect(option.value)">
        @if (scheme() === option.value) { <mat-icon class="swatch__check">check</mat-icon> }
      </button>
    }

    <!-- 2. Dynamic Saved Profiles -->
    @for (profile of savedProfiles(); track profile.id) {
      <button type="button" class="swatch"
        [class.swatch--active]="scheme() === profile.id"
        [style.--swatch-color]="profile.colors.primary"
        
        [matTooltip]="scheme() === profile.id ? 'Edit ' + profile.name : profile.name"
        (click)="onSchemeSelect(profile.id)"
        [matMenuTriggerFor]="scheme() === profile.id ? customMenu : null"
        (menuOpened)="onCustomMenuOpened(profile.id)">
        
        @if (scheme() === profile.id) { <mat-icon class="swatch__check">check</mat-icon> }
      </button>
    }

    <!-- 3. The Scratchpad (Custom mode) -->
    <button type="button" class="swatch swatch--custom"
      [class.swatch--active]="scheme() === 'custom'"
      [style.--swatch-color]="customColors().primary"
      
      [matTooltip]="scheme() === 'custom' ? 'Edit custom colors' : 'Custom colors'"
      (click)="onSchemeSelect('custom')"
      [matMenuTriggerFor]="scheme() === 'custom' ? customMenu : null"
      (menuOpened)="onCustomMenuOpened('custom')">
      
      @if (scheme() === 'custom') {
        <mat-icon class="swatch__check">check</mat-icon>
      } @else {
        <mat-icon class="swatch__custom-icon">tune</mat-icon>
      }
    </button>

    <!-- Menu overlay wrapper -->
    <mat-menu #customMenu="matMenu" class="custom-menu-panel">
      <ng-template matMenuContent>
        <div (click)="$event.stopPropagation()">
          <app-custom-color-picker (actionComplete)="closeCustomMenu()" />
        </div>
      </ng-template>
    </mat-menu>
  </div>
</div>
