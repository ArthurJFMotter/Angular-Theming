<h2 mat-dialog-title style="display: flex; align-items: center; gap: 8px">
  <mat-icon color="primary">settings</mat-icon>
  {{ 'dialog.title' | translate }}
</h2>

<mat-dialog-content>
  <p style="margin-top: 8px; color: var(--mat-sys-on-surface-variant)">
    {{ 'dialog.desc1' | translate }}
  </p>
  
  <p style="color: var(--mat-sys-on-surface-variant)" [innerHTML]="'dialog.desc2' | translate"></p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>{{ 'dialog.cancel' | translate }}</button>
  <button mat-flat-button color="primary" mat-dialog-close>
    {{ 'dialog.save' | translate }}
  </button>
</mat-dialog-actions>
